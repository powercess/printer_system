spring:
  application:
    name: printer_system
  config:
    import: optional:file:.env[.properties]
  autoconfigure:
    exclude:
      - dev.gotenberg.GotenbergAutoConfiguration

  # DataSource Configuration
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:print_system}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: PrinterSystemHikariPool

  # File Upload Configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:50MB}
      max-request-size: ${MAX_REQUEST_SIZE:100MB}

# MyBatis-Plus Configuration
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.powercess.printer_system.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.stdout.StdOutImpl}
  global-config:
    db-config:
      id-type: auto

# Sa-Token Configuration
sa-token:
  token-name: ${SA-TOKEN-TOKEN-NAME:Authorization}
  secret-key: ${SA-TOKEN-SECRET-KEY:powercess-printer-system-secret-key-2024}
  timeout: ${SA-TOKEN-TIMEOUT:172800}
  active-timeout: ${SA-TOKEN-ACTIVE-TIMEOUT:-1}
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: true
  is-read-header: true
  is-read-cookie: false

# Application Custom Configuration
app:
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  storage:
    type: ${STORAGE_TYPE:local}
    local:
      dir: ${UPLOAD_DIR:./uploads}
    s3:
      endpoint: ${S3_ENDPOINT:https://s3.amazonaws.com}
      region: ${S3_REGION:us-east-1}
      bucket: ${S3_BUCKET:}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
      path-style: ${S3_PATH_STYLE:false}
      presigned-url-expiration: ${S3_PRESIGNED_EXPIRATION:3600}
  cups:
    # 单服务器配置（向后兼容）
    host: ${CUPS_HOST:localhost}
    port: ${CUPS_PORT:631}
    username: ${CUPS_USERNAME:}
    password: ${CUPS_PASSWORD:}
    secure: ${CUPS_SECURE:false}
    # 负载均衡策略
    strategy: ${CUPS_STRATEGY:priority}
    # 模拟模式
    mock-mode: ${CUPS_MOCK_MODE:false}
    # 连接超时
    timeout: ${CUPS_TIMEOUT:30000}
    # 多服务器配置示例（通过环境变量配置）
    # servers:
    #   - id: main-cups
    #     host: 192.168.1.100
    #     port: 631
    #     username: admin
    #     password: secret
    #     secure: true
    #     priority: 10
    #   - id: backup-cups
    #     host: 192.168.1.101
    #     port: 631
    #     priority: 5
  payment:
    pid: ${PAY_PID:}
    key: ${PAY_KEY:}
    api-url: ${PAY_API_URL:https://api.payqixiang.cn/mapi.php}
    submit-url: ${PAY_SUBMIT_URL:https://api.payqixiang.cn/submit.php}
    query-url: ${PAY_QUERY_URL:https://api.payqixiang.cn/api.php}
  base-url: ${BASE_URL:https://printer.powercess.com}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

# Gotenberg Configuration
gotenberg:
  url: ${GOTENBERG_URL:http://localhost:3000}
  timeout: ${GOTENBERG_TIMEOUT:60000}

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Logging Configuration (controlled by LOG_MODE env variable)
# LOG_MODE: dev (detailed logs), prod (standard logs), quiet (minimal logs)
logging:
  level:
    com.powercess.printer_system: ${LOG_LEVEL_APP:INFO}
    org.springframework.web: ${LOG_LEVEL_WEB:INFO}
    # Database logs
    com.zaxxer.hikari: ${LOG_LEVEL_DB:INFO}
    com.zaxxer.hikari.HikariConfig: ${LOG_LEVEL_DB:INFO}
    org.springframework.jdbc: ${LOG_LEVEL_DB:INFO}
    org.springframework.jdbc.datasource: ${LOG_LEVEL_DB:INFO}
    org.mybatis: ${LOG_LEVEL_DB:INFO}
    org.apache.ibatis: ${LOG_LEVEL_DB:INFO}
    java.sql: ${LOG_LEVEL_DB:INFO}
