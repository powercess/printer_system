spring:
  application:
    name: printer_system
  config:
    import: optional:file:.env[.properties]

  # DataSource Configuration
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:print_system}?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: PrinterSystemHikariPool

  # File Upload Configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:50MB}
      max-request-size: ${MAX_REQUEST_SIZE:100MB}

# MyBatis-Plus Configuration
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.powercess.printer_system.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-delete-value: 'NOW()'
      logic-not-delete-value: 'NULL'

# Sa-Token Configuration
sa-token:
  token-name: ${SA-TOKEN-TOKEN-NAME:Authorization}
  secret-key: ${SA-TOKEN-SECRET-KEY:powercess-printer-system-secret-key-2024}
  timeout: ${SA-TOKEN-TIMEOUT:172800}
  active-timeout: ${SA-TOKEN-ACTIVE-TIMEOUT:-1}
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: true
  is-read-header: true
  is-read-cookie: false

# Application Custom Configuration
app:
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  cups:
    host: ${CUPS_HOST:192.168.1.149}
    port: ${CUPS_PORT:631}
  payment:
    pid: ${PAY_PID:2131}
    key: ${PAY_KEY:DDRFD8Y3yXreR1DX31vis14xD3pYEisS}
    api-url: ${PAY_API_URL:https://api.payqixiang.cn/mapi.php}
    submit-url: ${PAY_SUBMIT_URL:https://api.payqixiang.cn/submit.php}
    query-url: ${PAY_QUERY_URL:https://api.payqixiang.cn/api.php}
  base-url: ${BASE_URL:https://printer.powercess.com}

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Logging Configuration
logging:
  level:
    com.powercess.printer_system: DEBUG
    org.springframework.web: INFO