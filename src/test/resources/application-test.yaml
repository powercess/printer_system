spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  config:
    import: optional:file:.env.test[.properties]

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.powercess.printer_system.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-delete-value: "NOW()"
      logic-not-delete-value: "NULL"

sa-token:
  token-name: Authorization
  secret-key: test-secret-key-for-testing
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
  is-read-header: true
  is-read-cookie: false

# 应用测试配置
app:
  upload:
    dir: /tmp/test-uploads
  # 存储配置 - 支持环境变量覆盖
  storage:
    type: ${STORAGE_TYPE:local}
    local:
      dir: /tmp/test-uploads
    s3:
      endpoint: ${S3_ENDPOINT:https://s3.amazonaws.com}
      region: ${S3_REGION:us-east-1}
      bucket: ${S3_BUCKET:}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
      path-style: ${S3_PATH_STYLE:false}
      presigned-url-expiration: ${S3_PRESIGNED_EXPIRATION:3600}
  payment:
    pid: test-pid
    key: test-key
    api-url: https://test-api.example.com
    submit-url: https://test-submit.example.com
    query-url: https://test-query.example.com
  # CUPS 测试配置 - 支持环境变量覆盖
  cups:
    host: ${CUPS_TEST_HOST:192.168.1.149}
    port: ${CUPS_TEST_PORT:8631}
    username: ${CUPS_TEST_USERNAME:root}
    password: ${CUPS_TEST_PASSWORD:}
    secure: false
    mock-mode: ${CUPS_MOCK_MODE:false}
    timeout: 30000
  base-url: http://localhost:8080

logging:
  level:
    com.powercess.printer_system: DEBUG
    org.springframework.web: INFO